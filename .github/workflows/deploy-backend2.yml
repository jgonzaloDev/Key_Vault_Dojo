name: Deploy Backend (Spring Boot Multimodulo 2026)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clonar backend (Spring Boot)
        uses: actions/checkout@v4
        with:
          repository: jgonzaloDev/BACKEND_23-04-2026
          ref: main
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          path: backend

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./backend
        run: |
          echo "🔨 Compilando proyecto Spring Boot multimodulo..."
          mvn clean package -DskipTests
          echo "✅ Build completado"

      - name: Identify Main JAR
        id: jar
        working-directory: ./backend
        run: |
          echo "🔍 Buscando JAR ejecutable..."
          echo "📦 Listando todos los JARs generados:"
          find . -path "*/target/*.jar" ! -name "*-original.jar" -type f -exec ls -lh {} \;
          echo ""
          
          # Buscar el JAR más grande (que debería ser la aplicación principal)
          MAIN_JAR=$(find . -path "*/target/*.jar" \
            ! -name "*-original.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -type f -exec ls -s {} \; | sort -rn | head -n 1 | awk '{print $2}')
          
          if [ -z "$MAIN_JAR" ]; then
            echo "❌ No se encontró ningún JAR ejecutable"
            exit 1
          fi
          
          # Verificar tamaño
          SIZE=$(stat -c%s "$MAIN_JAR" 2>/dev/null || stat -f%z "$MAIN_JAR")
          SIZE_MB=$((SIZE / 1024 / 1024))
          
          echo "✅ JAR ejecutable identificado: $MAIN_JAR"
          echo "📏 Tamaño: ${SIZE_MB}MB"
          ls -lh "$MAIN_JAR"
          
          if [ "$SIZE_MB" -lt 5 ]; then
            echo "⚠️  ADVERTENCIA: El JAR parece pequeño (${SIZE_MB}MB)"
            echo "Asegúrate de que sea el JAR correcto"
          fi
          
          echo "JAR_FILE=$MAIN_JAR" >> $GITHUB_OUTPUT

      - name: Prepare deployment package
        working-directory: ./backend
        run: |
          echo "📦 Preparando paquete de deployment..."
          
          mkdir -p deploy/otel
          
          echo "📦 Copiando JAR principal..."
          cp ${{ steps.jar.outputs.JAR_FILE }} deploy/app.jar
          echo "✅ JAR principal copiado:"
          ls -lh deploy/app.jar
          
          echo "📦 Copiando agente OpenTelemetry..."
          if [ -f "app/opentelemetry-javaagent.jar" ]; then
            cp app/opentelemetry-javaagent.jar deploy/otel/opentelemetry-javaagent.jar
            echo "✅ Agente OpenTelemetry copiado:"
            ls -lh deploy/otel/opentelemetry-javaagent.jar
          else
            echo "❌ ERROR: No se encontró app/opentelemetry-javaagent.jar"
            echo "📂 Contenido del directorio app/:"
            ls -la app/
            exit 1
          fi
          
          echo ""
          echo "✅ Estructura final del paquete:"
          echo "================================"
          ls -lh deploy/
          echo ""
          ls -lh deploy/otel/
          echo "================================"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.TF_VAR_WEBAPP_BACKEND_NAME }}
          package: ./backend/deploy

      - name: Verify Deployment
        run: |
          echo "🔍 Verificando deployment..."
          APP_URL="https://${{ secrets.TF_VAR_WEBAPP_BACKEND_NAME }}.azurewebsites.net"
          echo "📍 URL: $APP_URL"
          
          echo "⏳ Esperando 60 segundos para que la app inicie..."
          sleep 60
          
          echo "🧪 Probando endpoint /customer..."
          if curl -f -s "$APP_URL/customer" > /dev/null 2>&1; then
            echo "✅ Backend desplegado exitosamente y respondiendo"
          else
            echo "⚠️ Backend desplegado pero puede tardar en iniciar"
            echo "🔗 Verifica manualmente: $APP_URL/customer"
          fi

      - name: Azure Logout
        if: always()
        run: az logout || true
