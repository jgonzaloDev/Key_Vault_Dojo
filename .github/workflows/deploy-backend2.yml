name: Deploy Backend (Spring Boot Multimodulo 2026)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Clonar backend (Spring Boot)
        uses: actions/checkout@v4
        with:
          repository: jgonzaloDev/BACKEND_MONOLITO_11-FEBRERO-2026
          ref: main
          token: ${{ secrets.GH_PERSONAL_TOKEN }}
          path: backend

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./backend
        run: |
          echo "🔨 Compilando proyecto Spring Boot multimodulo..."
          mvn clean package -DskipTests
          echo "✅ Build completado"

      - name: Identify Main JAR
        id: jar
        working-directory: ./backend
        run: |
          echo "🔍 Buscando JAR ejecutable..."
          
          MAIN_JAR=$(find . -path "*/target/*.jar" \
            ! -name "*-original.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -type f \
            -exec sh -c 'jar -tf {} | grep -q "org/springframework/boot/loader/JarLauncher" && echo {}' \; \
            | head -n 1)
          
          if [ -z "$MAIN_JAR" ]; then
            MAIN_JAR=$(find . -path "*/target/*.jar" \
              ! -name "*-original.jar" \
              -type f | head -n 1)
          fi
          
          echo "JAR_FILE=$MAIN_JAR" >> $GITHUB_OUTPUT
          echo "✅ JAR ejecutable: $MAIN_JAR"
          ls -lh "$MAIN_JAR"

      # =============================
      # Preparar estructura con el agente
      # =============================
      - name: Prepare deployment package
        working-directory: ./backend
        run: |
          echo "📦 Preparando paquete de deployment..."
          
          # Crear estructura de directorios
          mkdir -p deploy/otel
          
          # Copiar el JAR principal
          echo "📦 Copiando JAR principal..."
          cp ${{ steps.jar.outputs.JAR_FILE }} deploy/app.jar
          echo "✅ JAR principal copiado:"
          ls -lh deploy/app.jar
          
          # Copiar el agente de OpenTelemetry desde la ubicación exacta
          echo "📦 Copiando agente OpenTelemetry..."
          if [ -f "app/opentelemetry-javaagent.jar" ]; then
            cp app/opentelemetry-javaagent.jar deploy/otel/opentelemetry-javaagent.jar
            echo "✅ Agente OpenTelemetry copiado:"
            ls -lh deploy/otel/opentelemetry-javaagent.jar
          else
            echo "❌ ERROR: No se encontró app/opentelemetry-javaagent.jar"
            echo "📂 Contenido del directorio app/:"
            ls -la app/
            exit 1
          fi
          
          echo ""
          echo "✅ Estructura final del paquete:"
          echo "================================"
          ls -lh deploy/
          echo ""
          ls -lh deploy/otel/
          echo "================================"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.TF_VAR_WEBAPP_BACKEND_NAME }}
          package: ./backend/deploy

      - name: Verify Deployment
        run: |
          echo "🔍 Verificando deployment..."
          APP_URL="https://${{ secrets.TF_VAR_WEBAPP_BACKEND_NAME }}.azurewebsites.net"
          echo "📍 URL: $APP_URL"
          
          echo "⏳ Esperando 45 segundos para que la app inicie..."
          sleep 45
          
          echo "🧪 Probando endpoint /customer..."
          if curl -f -s "$APP_URL/customer" > /dev/null 2>&1; then
            echo "✅ Backend desplegado exitosamente y respondiendo"
          else
            echo "⚠️ Backend desplegado pero puede tardar en iniciar"
            echo "🔗 Verifica manualmente: $APP_URL/customer"
          fi

      - name: Azure Logout
        if: always()
        run: az logout || true